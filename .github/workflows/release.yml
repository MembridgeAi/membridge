# Publishes to npm when a GitHub release is published.
# Requires an npm automation token saved as the NPM_TOKEN repo secret
# (npmjs.com -> Access Tokens -> Generate New Token -> Automation).
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Prod deps from the lockfile; MCP SDK + zod are deliberately opt-in
      # (not in package.json) but the MCP tests require them. Mirrors ci.yml.
      - run: npm ci --omit=dev --no-audit --no-fund
      - run: npm install --no-save --no-audit --no-fund @modelcontextprotocol/sdk@^1 zod@^4
      - run: node test/run-tests.js
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
