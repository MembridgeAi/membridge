# Publishes to npm when a GitHub release is published.
# Requires a Granular Access Token saved as the NPM_TOKEN repo secret:
#   npmjs.com -> Access Tokens -> Generate New Token -> Granular Access Token
#   Packages and scopes: Read and write; enable "Bypass two-factor authentication".
# Classic "Automation" tokens no longer work: npm rejects them with
# "403 Two-factor authentication or granular access token with bypass 2fa
# enabled is required to publish packages."
# Once the package exists on npm, consider switching to Trusted Publishing
# (OIDC) in the package settings and dropping the token entirely.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: node test/run-tests.js
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
